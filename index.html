<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Form Prototyper</title>
    <!-- Create by Cameron Stahl with assist from Gemini AI -->
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: #1e1e1e; overflow: hidden; }
        #editor-container { width: 38%; padding: 15px; background: #252526; border-right: 2px solid #333; display: flex; flex-direction: column; }
        #toolbar { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; padding: 8px; background: #333; border-radius: 4px; }
        .tool-btn { padding: 4px 8px; font-size: 11px; font-weight: bold; background: #444; border: 1px solid #555; color: #ccc; border-radius: 3px; cursor: pointer; }
        #editor-wrapper { position: relative; flex-grow: 1; border: 1px solid #3e3e42; background: #1e1e1e; }
        #highlight-layer, #editor { position: absolute; top: 0; left: 0; width: 100%; height: 100%; margin: 0; padding: 15px; box-sizing: border-box; font-family: 'Consolas', monospace; font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-wrap: break-word; border: none; outline: none; overflow-y: auto; }
        #editor { background: transparent; color: transparent; caret-color: #fff; z-index: 2; resize: none; }
        #highlight-layer { color: #ffffff; z-index: 1; pointer-events: none; }
        .hl-section { color: #C75643; font-weight: bold; }
        .hl-header { color: #ECAE43; }
        .hl-widget { color: #FF79C6; }
        .hl-label { color: #8BE9FD; }
        .hl-logic { color: #4EC9B0; font-weight: bold; }
        #preview-container { width: 62%; background: #f5f6f7; display: flex; flex-direction: column; overflow: hidden; }
        #epic-header-sim { background: #dceef9; color: #0056b3; padding: 12px 20px; border-bottom: 1px solid #c5cdd4; font-weight: 600; }
        #preview-content { flex-grow: 1; padding: 20px; overflow-y: auto; }
        .epic-form-window { background: #fff; border: 1px solid #c5cdd4; border-radius: 3px; min-height: 100%; padding: 20px; }
        .epic-section { border: 1px solid #005ba3; margin-bottom: 15px; border-radius: 3px; overflow: hidden; }
        .epic-section-header { background: #005ba3; color: #fff; padding: 6px 10px; font-weight: bold; display: flex; align-items: center; cursor: pointer; }
        .epic-section-header::before { content: '\25BC'; font-size: 10px; margin-right: 8px; }
        .epic-section.collapsed .epic-section-body { display: none; }
        .epic-section-body { padding: 15px; }
        .epic-header { font-weight: bold; color: #333; margin: 15px 0 8px 0; font-size: 14px; }
        .epic-grid-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 8px; align-items: center; }
        .grid-item { display: flex; align-items: center; gap: 8px; min-width: 0; }
        .epic-row-container { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; flex-wrap: wrap; }
        .epic-text-inline { font-size: 13px; color: #2c3e50; white-space: nowrap; flex-shrink: 0; }
        
        /* Fixed Logic Visibility Classes */
        .logic-wrapper { display: none !important; gap: 8px; align-items: center; }
        .logic-wrapper.logic-visible { display: inline-flex !important; }
        .logic-wrapper.logic-block { width: 100%; }
        .logic-wrapper.logic-block.logic-visible { display: block !important; }
        
        .epic-input { padding: 3px 6px; border: 1px solid #999; border-radius: 2px; font-size: 13px; height: 26px; box-sizing: border-box; }
        .epic-textarea { width: 100%; height: 4.5em; border: 1px solid #999; border-radius: 2px; padding: 5px; font-size: 13px; box-sizing: border-box; resize: vertical; margin-bottom: 10px; }
        .epic-btn-single { background: #fff; color: #005ba3; border: 1px solid #005ba3; padding: 0 10px; height: 26px; border-radius: 3px; cursor: pointer; font-size: 12px; white-space: nowrap; }
        .epic-btn-single.active { background-color: #d0e1f0; font-weight: 600; }
        .epic-checkbox-container { display: flex; align-items: center; gap: 8px; font-size: 13px; height: 26px; cursor: pointer; }
        .epic-checkbox-container input { transform: scale(1.2); cursor: pointer; }
        .epic-np-container { display: inline-flex; position: relative; min-width: 100px; height: 26px; border: 1px solid #a5b7c9; border-radius: 3px; overflow: hidden; background: #f2f7ff; cursor: pointer; }
        .np-label-overlay { padding: 0 28px; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 12px; }
        .symbol { position: absolute; width: 24px; height: 100%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .symbol-pos { left: 0; } .symbol-neg { right: 0; }
        .state-pos { background: #fbe6e8; } .state-pos .symbol-pos { background: #c00; color: white; }
        .state-neg { background: #e8f5e9; } .state-neg .symbol-neg { background: #1b5e20; color: white; }
    </style>
</head>
<body>
    <div id="editor-container">
        <div id="toolbar">
            <button class="tool-btn" onclick="insertTag('section')">Section</button>
            <button class="tool-btn" onclick="insertTag('header')">Header</button>
            <button class="tool-btn" onclick="insertTag('grid')">Grid</button>
            <button class="tool-btn" onclick="insertTag('text')">Text</button>
            <button class="tool-btn" onclick="insertTag('neg_pos')">+/-</button>
            <button class="tool-btn" onclick="insertTag('button')">Buttons</button>
            <button class="tool-btn" onclick="insertTag('checkbox')">Checks</button>
            <button class="tool-btn" onclick="insertTag('number')">Num</button>
            <button class="tool-btn" onclick="insertTag('textbox')">Box</button>
            <button class="tool-btn" onclick="insertTag('paragraph')">Para</button>
        </div>
        <div id="editor-wrapper">
            <div id="highlight-layer"></div>
            <textarea id="editor" spellcheck="false">
                section[Welcome]
                header[What is this?]
                text[This page is designed to allow for prototyping of forms being added and worked on. You can use it to share with co workers or to visualize things yourself.]
                text[The left side of the page allows you to build elements, which are then shown on the right. Several types of input are allowed.]
                neg_pos[negative/positive selectors] button[Buttons] checkbox[Check boxes] number[3] text[Number boxes] textbox[15] text[Text boxes]
                paragraph[long-form word boxes]

                header[How does it work?]
                text[Each type of element is added by typing the name of the element followed by brackets] [ ]
                text[You can either type things in by hand, or use the buttons at the top left part of the screen which will type the element in for you.]

                section[Detailed breakdown of each element]
                header[Text]
                text[Text added between the brackets of the "Text" element show up as plain text in the prototype. This can be added before or after other elements for labeling.]
                text[For example, before/after a "Number Entry Box":] number[3] text[degrees]
                header[Negative / Positive Buttons]
                text[Adding words between the brackets of the Negative/Positive Button adds words to the Button itself.]
                neg_pos[Like This] neg_pos[Or This] neg_pos[Or Even This]

                header[Buttons]
                text[Adding words between the brackets of a Button adds words to the Button itself.]
                text[Save yourself some time when adding multiple Buttons by seperating them with a / within the brackets (see left side of the page)]
                button[One] button[two] button[three]
                button[one/two/three]
                text[If you need a "/" character in a Button, you can "escape" it with the "\" character (see left side of the page)]
                button[this \/ that]

                header[Check Boxes]
                text[Text in the brackets of a check box element adds words to the check box. The same time-saving system for Buttons works here as well]
                checkbox[Like this/this/that/WFL/WNL/WTF]

                header[Number Boxes]
                text[Adding a Number between the brackets of the Number element determines how many digits the box is sized for.]
                text[this box comfortably shows 2 digits] number[2]

                header[Textboxes]
                text[Adding a Number between the brackets of a Textbox determines how long the box is.]
                text[Leaving the brackets blank will create a box that spans the page.] textbox[]
                textbox[]
                textbox[20]

                header[Paragraph]
                text[Adding words between the brackets of a Paragraph element creates a label that appears just above the box.]
                paragraph[This is a label]

                section[Grids]
                text[The page has a built in Grid system that divides the page vertically into 5 Sections.]
                text[Using the "Grid" element allows you to specify where elements listed after the Grid Text appear (see below).]

                grid[1] text[Grid 1]
                grid[2] text[Grid 2]
                grid[3] text[Grid 3]
                grid[4] text[Grid 4]
                grid[5] text[Grid 5]
                grid[1] text[Grid 1] grid[2] text[Grid 2] grid[3] text[Grid 3] grid[4] text[Grid 4] grid[5] text[Grid 5]

                grid[1] textbox[10]
                grid[2] textbox[10]
                grid[3] textbox[10]
                grid[4] textbox[10]
                grid[5] textbox[10]
                grid[1] textbox[10] grid[2] textbox[10] grid[3] textbox[10] grid[4] textbox[10] grid[5] textbox[10]

                grid[1-2] textbox[]
                grid[1-3] textbox[]
                grid[3-4] textbox[]
                grid[3] textbox[35]
                grid[2] button[one/two] text[test] grid[3] button[one/two]
                grid[2] button[one/two] grid[3] text[test] button[one/two]


                text[Flexion:] grid[2] number[3] text[deg] grid[3-5] text[Comment:] textbox[]
                text[Extension:] grid[2] number[3] text[deg] grid[3-5] text[Comment:] textbox[]
                text[Right Rotation:] grid[2] number[3] text[deg] grid[3-5] text[Comment:] textbox[]
                text[Left Rotation:] grid[2] number[3] text[deg] grid[3-5] text[Comment:] textbox[]
                text[Right Side-bending:] grid[2] number[3] text[deg] grid[3-5] text[Comment:] textbox[]
                text[Left Side-bending:] grid[2] number[3] text[deg] grid[3-5] text[Comment:] textbox[]

                grid[1] text[errors can happen with spacing:] grid[2] textbox[30] grid[3] neg_pos[] grid[4] text[if you don't pay attention to Grid Numbers and Textbox sizing.]

                section[Logic]
                text[You can also build in logic to these forms, which is something you see in the HPI Section.]
                text[When you select an imaging study, a Text box appears to allow you to document.]
                text[To do this here, you can use matching hashtags (see left side of page). The first set should be inside brackets, the second outside]
                button[Choice A#choiceA] button[Choice B#choiceB]
                text[Choice A]#choiceA textbox[40]#choiceA checkbox[test]#choiceA
                text[Choice B]#choiceB textbox[40]#choiceB checkbox[test 2]#choiceB

                text[this is equivalent]
                button[Choice A#choiceAalt/Choice B#choiceBalt]
                text[Choice A]#choiceAalt textbox[40]#choiceAalt checkbox[test]#choiceAalt
                text[Choice B]#choiceBalt textbox[40]#choiceBalt checkbox[test 2]#choiceBalt

                text[You can stack tags to allow for several layers of logic, but it tends to work better if you use individual Button or Checkbox tags]
                button[Organ#one] button[Tissue#a]#one button[Cell]#a
                button[Animal#two] button[Reptile#b]#two button[crocodile]#b

                checkbox[test#z] checkbox[test2#x]#z
                text[X marks the spot]#x textbox[30]#x
                button[Aye Matey!#y]#x
                button[Yo Ho]#y

                text[Only Buttons and Check boxes can be used to trigger logic at this time.]
                text[We may be able to use positive/negative selectors in our EHR to trigger logic, but I'm not positive and I decided to not allow it in this prototype.]
            </textarea>
        </div>
    </div>
    <div id="preview-container">
        <div id="epic-header-sim">Form Prototype</div>
        <div id="preview-content"><div class="epic-form-window" id="preview"></div></div>
    </div>
    <script>
        const editor = document.getElementById('editor'), highlightLayer = document.getElementById('highlight-layer'), preview = document.getElementById('preview');
        
        function updateHighlights() {
            let val = editor.value.replace(/&/g, "&amp;").replace(/</g, "&lt;");
            const regex = /(section|header|button|checkbox|neg_pos|number|textbox|grid|text|paragraph)|(\[|\])|(#\w+)/g;
            highlightLayer.innerHTML = val.replace(regex, (m, w, b, l) => {
                if (w === 'section') return `<span class="hl-section">${w}</span>`;
                if (w === 'header') return `<span class="hl-header">${w}</span>`;
                if (w === 'text' || w === 'paragraph') return `<span class="hl-label">${w}</span>`;
                if (w) return `<span class="hl-widget">${w}</span>`;
                if (l) return `<span class="hl-logic">${l}</span>`;
                return m;
            });
            highlightLayer.scrollTop = editor.scrollTop;
        }

        function smartSplit(str) { return str.split(/(?<!\\)\//).map(p => p.replace(/\\\//g, '/').trim()); }
        
        // Removed the inline display:none style and added the .logic-block class support
        function wrapLogic(html, id, isBlock = false) { 
            if (!id) return html;
            return `<div class="logic-wrapper ${isBlock ? 'logic-block' : ''}" data-logic="${id.substring(1)}">${html}</div>`; 
        }
        
        function renderPreview() {
            const lines = editor.value.split('\n');
            let html = '', currentSection = false;
            
            lines.forEach(line => {
                let cur = line.trim(); if (!cur) return;
                
                if (cur.startsWith('section[')) {
                    if (currentSection) html += '</div></div>';
                    const m = cur.match(/section\[([^\]]*)\]?/);
                    html += `<div class="epic-section"><div class="epic-section-header">${m ? m[1] : "Section"}</div><div class="epic-section-body">`;
                    currentSection = true; return;
                }
                if (cur.includes('header[')) { 
                    const m = cur.match(/header\[([^\]]*)\]?/);
                    html += `<div class="epic-header">${m ? m[1] : ""}</div>`; return; 
                }
                
                // Block rendering now relies safely on external CSS
                if (cur.includes('paragraph[')) { 
                    const m = cur.match(/paragraph\[([^\]#]*)\]?(#\w+)?/);
                    const paraHtml = `<div style="margin-top:10px; width:100%;"><label class="epic-header" style="display:block;margin-bottom:5px;">${m ? m[1] : ""}</label><textarea class="epic-textarea"></textarea></div>`;
                    html += wrapLogic(paraHtml, m ? m[2] : null, true); 
                    return; 
                }
                
                const parts = cur.split(/(grid\[[\d-]+\])/);
                let hasGrid = cur.includes('grid['), rowHTML = hasGrid ? '<div class="epic-grid-row">' : '<div class="epic-row-container">', curSpan = "span 1", curCol = "auto";
                
                parts.forEach(part => {
                    const gridMatch = part.match(/grid\[(\d+)-?(\d+)?\]/);
                    if (gridMatch) { curCol = gridMatch[1]; curSpan = gridMatch[2] ? `span ${(parseInt(gridMatch[2]) - parseInt(gridMatch[1])) + 1}` : "span 1"; }
                    else if (part.trim()) {
                        let content = part
                            .replace(/text\[([^\]#]*)\](#\w+)?/g, (m, t, id) => wrapLogic(`<span class="epic-text-inline">${t}</span>`, id))
                            .replace(/neg_pos\[([^\]#]*)\](#\w+)?/g, (m, l, id) => wrapLogic(`<div class="epic-np-container"><div class="symbol symbol-pos">+</div><div class="np-label-overlay">${l}</div><div class="symbol symbol-neg">-</div><div class="np-zone np-zone-pos" style="position:absolute;left:0;width:28px;height:100%"></div><div class="np-zone np-zone-neg" style="position:absolute;right:0;width:28px;height:100%"></div></div>`, id))
                            .replace(/button\[([^\]]+)\](#\w+)?/g, (m, inner, id) => {
                                let btns = smartSplit(inner).map(btn => { const b = btn.split('#'); return `<button class="epic-btn-single" ${b[1]?`data-trigger="${b[1]}"`:''}>${b[0]}</button>`; }).join(' ');
                                return wrapLogic(btns, id);
                            })
                            .replace(/checkbox\[([^\]]+)\](#\w+)?/g, (m, inner, id) => {
                                let chks = smartSplit(inner).map(chk => { 
                                    const c = chk.split('#'); 
                                    return `<label class="epic-checkbox-container"><input type="checkbox" class="epic-chk-trigger" ${c[1]?`data-trigger="${c[1]}"`:''}>${c[0]}</label>`; 
                                }).join(' ');
                                return wrapLogic(chks, id);
                            })
                            .replace(/number\[(\d*)\](#\w+)?/g, (m, v, id) => {
                                const targetWidth = v ? `${parseFloat(v) + 2.5}em` : '5em'; 
                                return wrapLogic(`<input type="number" class="epic-input" style="width:${targetWidth} !important; min-width: 0 !important; flex: none;">`, id);
                            })
                            .replace(/textbox\[(\d*)\](#\w+)?/g, (m, v, id) => {
                                const boxStyle = v ? `width:${v}em !important; min-width: 0 !important; flex: none;` : `min-width: 120px; flex-grow: 1;`;
                                return wrapLogic(`<input type="text" class="epic-input" style="${boxStyle}">`, id);
                            });
                        rowHTML += hasGrid ? `<div class="grid-item" style="grid-column: ${curCol} / ${curSpan}">${content}</div>` : content;
                    }
                });
                html += rowHTML + '</div>';
            });
            preview.innerHTML = html + (currentSection ? '</div></div>' : '');
            updateHighlights();
        }

        preview.addEventListener('click', e => {
            if (e.target.classList.contains('epic-btn-single')) {
                e.target.classList.toggle('active');
                const tid = e.target.getAttribute('data-trigger');
                if (tid) document.querySelectorAll(`[data-logic="${tid}"]`).forEach(t => t.classList.toggle('logic-visible', e.target.classList.contains('active')));
            }
            
            const zone = e.target.closest('.np-zone');
            if (zone) {
                const c = zone.closest('.epic-np-container');
                const isPos = zone.classList.contains('np-zone-pos');
                const newState = isPos ? 'state-pos' : 'state-neg';

                if (c.classList.contains(newState)) { c.classList.remove('state-pos', 'state-neg'); } 
                else { c.classList.remove('state-pos', 'state-neg'); c.classList.add(newState); }
            }
            
            if (e.target.classList.contains('epic-section-header')) e.target.closest('.epic-section').classList.toggle('collapsed');
        });

        preview.addEventListener('change', e => {
            if (e.target.classList.contains('epic-chk-trigger')) {
                const tid = e.target.getAttribute('data-trigger');
                if (tid) document.querySelectorAll(`[data-logic="${tid}"]`).forEach(t => t.classList.toggle('logic-visible', e.target.checked));
            }
        });

        function insertTag(t) { 
            const s = editor.selectionStart; 
            editor.value = editor.value.substring(0, s) + t + "[]" + editor.value.substring(editor.selectionEnd); 
            editor.selectionStart = editor.selectionEnd = s + t.length + 1;
            editor.focus();
            renderPreview(); 
        }

        editor.addEventListener('input', renderPreview);
        editor.addEventListener('scroll', () => highlightLayer.scrollTop = editor.scrollTop);
        renderPreview();
    </script>
</body>
</html>
